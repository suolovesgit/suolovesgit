<svg width="1280" height="330" viewBox="0 0 1280 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">README style tiles</title>
  <desc id="desc">Four polished tiles showing low info, high style, lanyard live, and flex mode.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1280" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060911"/>
      <stop offset="0.55" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#091716"/>
    </linearGradient>
    <linearGradient id="edge" x1="42" y1="36" x2="1238" y2="294" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2EF7FF"/>
      <stop offset="0.34" stop-color="#A86BFF"/>
      <stop offset="0.68" stop-color="#FF4FD8"/>
      <stop offset="1" stop-color="#F8D64E"/>
    </linearGradient>
    <filter id="glow" x="-40" y="-40" width="1360" height="410" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#31F7FF" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#FF4FD8" flood-opacity="0.14"/>
    </filter>
    <style>
      .bar-a { animation: barA 4.2s ease-in-out infinite; }
      .bar-b { animation: barB 4.8s ease-in-out infinite; }
      .bar-c { animation: barC 5.4s ease-in-out infinite; }
      .spark { animation: spark 3.6s ease-in-out infinite; }
      @keyframes barA { 0%, 100% { width: 90px; } 50% { width: 150px; } }
      @keyframes barB { 0%, 100% { width: 130px; } 50% { width: 70px; } }
      @keyframes barC { 0%, 100% { width: 80px; } 50% { width: 170px; } }
      @keyframes spark { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect x="28" y="22" width="1224" height="286" rx="28" fill="url(#panel)" stroke="url(#edge)" stroke-width="2" filter="url(#glow)"/>
  <g opacity="0.18">
    <path d="M70 92H1210M70 165H1210M70 238H1210" stroke="#D7FDFF"/>
    <path d="M330 48V282M640 48V282M950 48V282" stroke="#D7FDFF"/>
  </g>

  <g transform="translate(72 66)">
    <rect width="244" height="198" rx="18" fill="#0D1425" stroke="#31F7FF" stroke-opacity="0.62"/>
    <text x="28" y="50" fill="#31F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">LOW INFO</text>
    <text x="28" y="105" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">LOCKED</text>
    <text x="28" y="142" fill="#AAB8CF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">no bio wall</text>
    <rect class="bar-a" x="28" y="164" height="8" rx="4" fill="#31F7FF"/>
    <rect x="28" y="180" width="188" height="8" rx="4" fill="#31F7FF" opacity="0.22"/>
  </g>

  <g transform="translate(364 66)">
    <rect width="244" height="198" rx="18" fill="#120F24" stroke="#A86BFF" stroke-opacity="0.7"/>
    <text x="28" y="50" fill="#B88BFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">HIGH STYLE</text>
    <text x="28" y="105" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">MAXED</text>
    <text x="28" y="142" fill="#B9AECF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">visual first</text>
    <rect class="bar-b" x="28" y="164" height="8" rx="4" fill="#A86BFF"/>
    <rect x="28" y="180" width="166" height="8" rx="4" fill="#A86BFF" opacity="0.24"/>
  </g>

  <g transform="translate(656 66)">
    <rect width="244" height="198" rx="18" fill="#171020" stroke="#FF4FD8" stroke-opacity="0.7"/>
    <text x="28" y="50" fill="#FF83E3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">LANYARD</text>
    <text x="28" y="105" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">LIVE</text>
    <text x="28" y="142" fill="#D0ABC7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">discord presence</text>
    <rect class="bar-c" x="28" y="164" height="8" rx="4" fill="#FF4FD8"/>
    <rect x="28" y="180" width="176" height="8" rx="4" fill="#FF4FD8" opacity="0.23"/>
  </g>

  <g transform="translate(948 66)">
    <rect width="244" height="198" rx="18" fill="#18170C" stroke="#F8D64E" stroke-opacity="0.72"/>
    <text x="28" y="50" fill="#F8D64E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">FLEX MODE</text>
    <text x="28" y="105" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="900">LOUD</text>
    <text x="28" y="142" fill="#D5C991" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="650">nothing extra</text>
    <g class="spark">
      <circle cx="38" cy="170" r="6" fill="#F8D64E"/>
      <circle cx="68" cy="170" r="6" fill="#31F7FF"/>
      <circle cx="98" cy="170" r="6" fill="#FF4FD8"/>
    </g>
    <rect x="28" y="184" width="184" height="8" rx="4" fill="#F8D64E" opacity="0.2"/>
  </g>
</svg>
