<svg width="1280" height="180" viewBox="0 0 1280 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">README footer</title>
  <desc id="desc">A neon footer that says no links no pitch just the look.</desc>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1280" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061018"/>
      <stop offset="0.5" stop-color="#130B20"/>
      <stop offset="1" stop-color="#15130A"/>
    </linearGradient>
    <linearGradient id="wave" x1="100" y1="82" x2="1180" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31F7FF"/>
      <stop offset="0.5" stop-color="#FF4FD8"/>
      <stop offset="1" stop-color="#F8D64E"/>
    </linearGradient>
    <filter id="glow" x="-20" y="-20" width="1320" height="220" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#31F7FF" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#FF4FD8" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="20" y="18" width="1240" height="144" rx="30" fill="url(#fade)" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <path d="M98 86C185 36 264 136 354 86C444 36 523 136 613 86C703 36 782 136 872 86C962 36 1041 136 1131 86" stroke="url(#wave)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <text x="640" y="126" fill="#EEF7FF" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">NO LINKS / NO PITCH / JUST THE LOOK</text>
</svg>
