<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linux terminal running a loop</title>
  <desc id="desc">A realistic Linux terminal waits, types a sudo while true command, then repeatedly prints suolovesgit.</desc>
  <style>
    .mono { font-family: "Ubuntu Mono", "Cascadia Mono", "JetBrains Mono", Consolas, monospace; }
    .prompt-user { fill: #35d06f; }
    .prompt-path { fill: #4aa3ff; }
    .text { fill: #e7eaf0; }
    .muted { fill: #a8b0bd; }
    .output { fill: #e7eaf0; }
  </style>

  <rect width="1280" height="520" rx="18" fill="#0b0f14"/>

  <rect x="90" y="54" width="1100" height="412" rx="10" fill="#1f232a"/>
  <rect x="91" y="55" width="1098" height="410" rx="9" stroke="#343a46" stroke-width="2"/>

  <rect x="90" y="54" width="1100" height="46" rx="10" fill="#2b3038"/>
  <path d="M90 90H1190V100H90V90Z" fill="#2b3038"/>
  <circle cx="119" cy="77" r="7" fill="#ff5f57"/>
  <circle cx="143" cy="77" r="7" fill="#febc2e"/>
  <circle cx="167" cy="77" r="7" fill="#28c840"/>
  <text x="640" y="83" class="mono muted" text-anchor="middle" font-size="18" font-weight="700">suolovesgit@linux: ~</text>

  <rect x="110" y="118" width="1060" height="326" rx="4" fill="#0c0c0c"/>
  <g clip-path="url(#screen)">
    <text x="132" y="158" class="mono" font-size="22" font-weight="700">
      <tspan class="prompt-user">suolovesgit@linux</tspan><tspan class="text">:</tspan><tspan class="prompt-path">~</tspan><tspan class="text">$</tspan>
    </text>

    <text x="414" y="158" class="mono text" font-size="22" font-weight="700">sudo sh -c 'while true; do echo suolovesgit; done'</text>

    <rect x="414" y="132" width="695" height="32" fill="#0c0c0c">
      <animate attributeName="width" begin="5s" dur="3.2s" from="695" to="0" fill="freeze"/>
    </rect>

    <rect x="414" y="135" width="10" height="26" fill="#e7eaf0">
      <animate attributeName="x" begin="5s" dur="3.2s" from="414" to="1109" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="1102" y="132" width="28" height="32" fill="#0c0c0c" opacity="0">
      <animate attributeName="opacity" begin="8.25s" dur="0.01s" from="0" to="1" fill="freeze"/>
    </rect>

    <g opacity="0">
      <animate attributeName="opacity" begin="8.45s" dur="0.1s" from="0" to="1" fill="freeze"/>
      <g>
        <animateTransform attributeName="transform" type="translate" begin="8.45s" dur="2.6s" values="0 0;0 -156" repeatCount="indefinite"/>
        <g class="mono output" font-size="23" font-weight="700">
          <text x="132" y="203">suolovesgit</text>
          <text x="132" y="229">suolovesgit</text>
          <text x="132" y="255">suolovesgit</text>
          <text x="132" y="281">suolovesgit</text>
          <text x="132" y="307">suolovesgit</text>
          <text x="132" y="333">suolovesgit</text>
          <text x="132" y="359">suolovesgit</text>
          <text x="132" y="385">suolovesgit</text>
          <text x="132" y="411">suolovesgit</text>
        </g>
        <g class="mono output" font-size="23" font-weight="700" transform="translate(0 156)">
          <text x="132" y="203">suolovesgit</text>
          <text x="132" y="229">suolovesgit</text>
          <text x="132" y="255">suolovesgit</text>
          <text x="132" y="281">suolovesgit</text>
          <text x="132" y="307">suolovesgit</text>
          <text x="132" y="333">suolovesgit</text>
          <text x="132" y="359">suolovesgit</text>
          <text x="132" y="385">suolovesgit</text>
          <text x="132" y="411">suolovesgit</text>
        </g>
      </g>
    </g>
  </g>

  <defs>
    <clipPath id="screen">
      <rect x="110" y="118" width="1060" height="326" rx="4"/>
    </clipPath>
  </defs>
</svg>
