<svg width="1000" height="560" viewBox="0 0 1000 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linux terminal</title>
  <desc id="desc">A Linux terminal running a while true loop that prints suolovesgit repeatedly.</desc>
  <style>
    .term { font-family: "Cascadia Mono", "JetBrains Mono", "Ubuntu Mono", "SFMono-Regular", Consolas, monospace; }
    .title { fill: #5fc9c8; font-size: 13px; }
    .user { fill: #00ffd0; font-weight: 700; }
    .host { fill: #ff3d57; font-weight: 700; }
    .path { fill: #fff56b; font-weight: 700; }
    .cmd { fill: #ffffff; font-weight: 700; }
    .out { fill: #f5f7fb; font-weight: 650; }
    .cursor { fill: #ffd75a; }
  </style>

  <rect width="1000" height="560" fill="#0b1017"/>
  <rect x="14" y="12" width="972" height="536" rx="10" fill="#030303" stroke="#242a31"/>

  <circle cx="42" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="67" cy="40" r="7" fill="#febc2e"/>
  <circle cx="92" cy="40" r="7" fill="#28c840"/>
  <text x="500" y="45" text-anchor="middle" class="term title">suolovesgit@dev-machine  -  bash  -  80x24</text>

  <text x="44" y="84" class="term" font-size="17">
    <tspan class="user">suolovesgit</tspan><tspan class="host">@dev-machine</tspan><tspan class="cmd">:</tspan><tspan class="path">~</tspan><tspan class="cmd">$ sudo sh -c 'while true; do echo suolovesgit; done'</tspan>
  </text>

  <g class="term out" font-size="18">
    <text x="44" y="126">suolovesgit</text>
    <text x="44" y="153">suolovesgit</text>
    <text x="44" y="180">suolovesgit</text>
    <text x="44" y="207">suolovesgit</text>
    <text x="44" y="234">suolovesgit</text>
    <text x="44" y="261">suolovesgit</text>
    <text x="44" y="288">suolovesgit</text>
    <text x="44" y="315">suolovesgit</text>
    <text x="44" y="342">suolovesgit</text>
    <text x="44" y="369">suolovesgit</text>
    <text x="44" y="396">suolovesgit</text>
    <text x="44" y="423">suolovesgit</text>
    <text x="44" y="450">suolovesgit</text>
    <text x="44" y="477">suolovesgit</text>
    <text x="44" y="504">suolovesgit</text>
  </g>

  <rect x="184" y="486" width="10" height="19" class="cursor">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
